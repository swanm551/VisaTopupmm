<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiktok coin price</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjOd1ufKHkNXLPmTI4s1feQWObG7DwY1cpIkYwBbMJJqm7JOLEKrKMAdNIE565tOmPKGbm9Ku_SdUbsKXN6YcANjGBHMLvJpsQgelcjFabjrb2_TJGLssQLmQWOfDvFPd7A1erbv_IGfK626zMfMpVfNJtZNNtR2pIsOK0HTdLqXnProNxWiPaWwAvZ2Gez/s1600/Webp.net-resizeimage.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary-light:    #f0f0f0;
            --bg-secondary-light:  #e0e0e0;
            --text-primary-light:  #333333;
            --text-secondary-light:#666666;
            --border-color-light:  #d0d0d0;
            --bg-primary-dark:     #121212;
            --bg-secondary-dark:   #1e1e1e;
            --text-primary-dark:   #f0f0f0;
            --text-secondary-dark: #b0b0b0;
            --border-color-dark:   #2a2a2a;
            --accent-blue:         #3B82F6;
            --accent-blue-dark:    #2563EB;
        }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        transition: background 0.3s ease, color 0.3s ease;
        min-height: 100vh;
    }

    body.dark-theme  { background: var(--bg-primary-dark);  color: var(--text-primary-dark); }
    body.light-theme { background: var(--bg-primary-light); color: var(--text-primary-light); }

    /* ══ HEADER ══════════════════════════════════════════════ */
    .header {
        padding: 20px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(2px); transition: all 0.3s ease;
    }

    body.dark-theme .header {
        background: rgba(18,18,18,0.85);
        border-bottom: 1px solid var(--border-color-dark);
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    body.light-theme .header {
        background: rgba(240,240,240,0.85);
        border-bottom: 1px solid var(--border-color-light);
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .logo-section { display: flex; align-items: center; gap: 6px; }
    .logo-section a {
        display: flex; align-items: center; gap: 10px;
        text-decoration: none; transition: all 0.3s ease;
    }
    .logo-section a:hover  { opacity: 0.9; transform: translateY(-1px); }
    .logo-section a:active { transform: translateY(1px); }
    .logo { height: 40px; width: auto; }

    @keyframes flowGradient {
        0%   { background-position: 100% 50%; }
        100% { background-position: 0%   50%; }
    }

    .site-title {
        font-size: 28px; font-weight: 600; font-family: 'Inter', sans-serif;
        background: linear-gradient(90deg, var(--accent-blue-dark), var(--accent-blue), #ffffff, var(--accent-blue), var(--accent-blue-dark));
        background-size: 300% 100%; animation: flowGradient 3s linear infinite;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    body.light-theme .site-title {
        background: linear-gradient(90deg, var(--accent-blue-dark), #1a1a1a, #888, #1a1a1a, var(--accent-blue-dark));
        background-size: 300% 100%; animation: flowGradient 3s linear infinite;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .theme-toggle {
        width: 44px; height: 44px; border-radius: 12px; border: none;
        cursor: pointer; font-size: 20px;
        display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
    }

    body.dark-theme .theme-toggle {
        background: var(--bg-secondary-dark); color: var(--text-primary-dark);
        box-shadow: 6px 6px 12px rgba(0,0,0,0.3), -6px -6px 12px rgba(70,70,70,0.1);
    }

    body.light-theme .theme-toggle {
        background: var(--bg-secondary-light); color: var(--text-primary-light);
        box-shadow: 6px 6px 12px rgba(0,0,0,0.1), -6px -6px 12px rgba(255,255,255,0.8);
    }

    .theme-toggle:hover  { transform: translateY(-2px); }
    .theme-toggle:active { transform: translateY(1px); }

    /* ══ PAGE CONTAINER ═════════════════════════════════════ */
    .subpage-container {
        max-width: 900px; margin: 0 auto; padding: 40px 16px 80px;
    }

    /* ══════════════════════════════════════════════════════════
       HERO SECTION
       ──────────────────────────────────────────────────────────
       Structure:
         .hero-wrap (position:relative, overflow:hidden)
           ├── .title-layer  (position:absolute, full-size, z:1)
           │     └── big title text  ← sits BEHIND glass
           └── .glass-card   (position:relative, z:2, margin-top = expose title)
                 ├── backdrop-filter: blur  ← blurs the title behind it
                 └── table

       The title is LITERALLY BEHIND the glass card.
       backdrop-filter blurs whatever is behind the element,
       so the title text that the glass card overlaps appears blurred.
       The top portion of the title (above the card) is fully sharp.
    ══════════════════════════════════════════════════════════ */
    .hero-wrap {
        position: relative;
        border-radius: 20px;
        overflow: visible;
    }

    /* Title layer: absolutely positioned, centered vertically
       so that its CENTER aligns with the TOP EDGE of the glass card */
    .title-layer {
        position: relative;
        z-index: 1;
        text-align: center;
        pointer-events: none;
        user-select: none;
        /* Height = half the title so exactly half peeks above card */
        padding-bottom: 0;
    }

    .subpage-title {
        display: inline-block;
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-style: normal;
        font-size: clamp(30px, 5vw, 52px);
        line-height: 1.1;
        letter-spacing: -0.5px;
        white-space: nowrap;
    }

    /* Dark theme: bright white title on dark bg */
    body.dark-theme .subpage-title {
        color: rgba(235, 238, 255, 0.95);
        text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    /* Light theme: dark title on light bg */
    body.light-theme .subpage-title {
        color: rgba(20, 25, 50, 0.90);
        text-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* Glass card: pulled UP over bottom half of title via negative margin */
    .glass-card {
        position: relative;
        z-index: 2;
        /* Negative margin = pull card up to overlap bottom half of title.
           Adjust this value to control how much title is "behind" the glass */
        margin-top: -30px;
        border-radius: 18px;
        overflow: hidden;
        /* THIS is what blurs the title text underneath */
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
    }

    body.dark-theme .glass-card {
        background: rgba(20, 28, 50, 0.55);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    body.light-theme .glass-card {
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid rgba(255,255,255,0.60);
        box-shadow: 0 20px 60px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    /* ══ TABLE ══════════════════════════════════════════════ */
    .subpage-table {
        width: 100%; border-collapse: collapse;
        font-family: 'Inter', sans-serif;
    }

    .subpage-table th,
    .subpage-table td {
        padding: 16px 20px; text-align: center;
        transition: background 0.2s ease;
    }

    /* Header: transparent blue tint + blur */
    .subpage-table th {
        background: rgba(59,130,246,0.30);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        font-weight: 700; font-size: 13px;
        text-transform: uppercase; letter-spacing: 0.07em;
        border-bottom: 1px solid rgba(59,130,246,0.30);
    }

    body.dark-theme .subpage-table th {
        color: rgba(255,255,255,0.92);
    }

    body.light-theme .subpage-table th {
        color: rgba(15,25,60,0.90);
    }

    .subpage-table td {
        font-size: 15px;
        border-bottom: 1px solid rgba(128,128,180,0.10);
    }

    body.dark-theme  .subpage-table td { color: rgba(220,225,245,0.90); }
    body.light-theme .subpage-table td { color: rgba(20,25,50,0.85); }

    body.dark-theme  .subpage-table tr:nth-child(even) td { background: rgba(59,130,246,0.06); }
    body.light-theme .subpage-table tr:nth-child(even) td { background: rgba(59,130,246,0.04); }

    .subpage-table tbody tr:last-child td { border-bottom: none; }

    .subpage-table tr:hover td {
        background: rgba(59,130,246,0.14) !important;
    }

    /* Coin icon after first-column cell */
    .subpage-table td:first-child::after {
        content: "";
        display: inline-block;
        background-image: url("assets/TikTokCoin.png");
        background-size: contain; background-repeat: no-repeat; background-position: center;
        width: 18px; height: 18px; margin-left: 8px; vertical-align: middle;
    }

    /* Row fade-in */
    .subpage-table tbody tr {
        opacity: 0; transform: translateY(10px);
        transition: opacity 0.4s ease-out, transform 0.4s ease-out;
    }
    .subpage-table tbody tr.fade-in-up { opacity: 1; transform: translateY(0); }

    /* ══ LOADING / ERROR / SKELETON ════════════════════════ */
    .loading {
        padding: 40px; text-align: center;
        font-family: 'Inter', sans-serif; font-size: 18px;
    }

    body.dark-theme  .loading { color: var(--text-secondary-dark); }
    body.light-theme .loading { color: var(--text-secondary-light); }

    .error {
        padding: 40px; text-align: center; color: #ff6b6b;
        font-family: 'Inter', sans-serif; font-size: 18px;
    }

    .skeleton-row {
        height: 40px; margin: 12px 0; border-radius: 10px;
        position: relative; overflow: hidden;
    }

    body.dark-theme .skeleton-row {
        background: linear-gradient(90deg,#2a2a2a 25%,#333 50%,#2a2a2a 75%);
    }

    body.light-theme .skeleton-row {
        background: linear-gradient(90deg,#ddd 25%,#eee 50%,#ddd 75%);
    }

    .skeleton-row::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
        animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* ══ SCROLL TO TOP ══════════════════════════════════════ */
    #return-to-top {
        position: fixed; bottom: 30px; right: 30px;
        width: 50px; height: 50px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-dark));
        border: none; color: white; cursor: pointer;
        display: none; align-items: center; justify-content: center;
        transition: all 0.3s ease; z-index: 1000;
    }

    body.dark-theme #return-to-top {
        box-shadow: 5px 5px 15px rgba(0,0,0,0.4), 0 0 0 2px rgba(59,130,246,0.5);
    }

    body.light-theme #return-to-top {
        box-shadow: 5px 5px 15px rgba(0,0,0,0.2), 0 0 0 2px rgba(59,130,246,0.5);
    }

    #return-to-top:hover  { transform: translateY(-5px) scale(1.05); }
    #return-to-top:active { transform: translateY(2px); }

    /* ══ COPYRIGHT ══════════════════════════════════════════ */
    #copyright-text {
        font-family: 'Inter', sans-serif; text-align: center; font-size: small;
        margin-top: 20px; margin-bottom: 80px; padding: 0 20px;
    }

    body.dark-theme  #copyright-text { color: var(--text-secondary-dark); }
    body.light-theme #copyright-text { color: var(--text-secondary-light); }

    /* ══ RESPONSIVE ═════════════════════════════════════════ */
    @media (max-width: 768px) {
        .site-title { font-size: clamp(22px, 6vw, 36px); white-space: normal; }
        .glass-card { margin-top: -22px; }
        .subpage-table { font-size: 13px; }
        .subpage-table th, .subpage-table td { padding: 12px 8px; }
    }

    @media (max-width: 480px) {
        .header { padding: 15px; }
        .logo { height: 32px; }
        .theme-toggle { width: 40px; height: 40px; font-size: 18px; }
        .site-title { font-size: 20px; white-space: normal; }
        .glass-card { margin-top: -16px; }
        .subpage-table { font-size: 11px; }
        .subpage-table th, .subpage-table td { padding: 10px 6px; }
    }
</style>

</head>
<body class="dark-theme">

<header class="header">
    <div class="logo-section">
        <a href="index.html">
            <img alt="Logo" class="logo" src="assets/logo.png">
            <h1 class="site-title">Visa Topup Myanmar</h1>
        </a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-sun"></i>
    </button>
</header>

<div class="subpage-container">
    <div class="hero-wrap">

        <!--
            LAYER 1 (z:1): Title text — fully visible above the glass card.
            The bottom portion of this text will be BEHIND the glass card,
            and backdrop-filter will blur it.
        -->
        <div class="title-layer">
            <h2 class="subpage-title">TikTok coin price list</h2>
        </div>

        <!--
            LAYER 2 (z:2): Glass card with backdrop-filter blur.
            Negative margin-top pulls it up to overlap the bottom of the title.
            The blur applies to everything BEHIND this element — including the title.
        -->
        <div class="glass-card">
            <div id="subpageTableContainer">
                <div class="loading">Loading coin price list...</div>
            </div>
        </div>

    </div>
</div>

<p id="copyright-text"></p>

<div id="return-to-top" onclick="scrollToTop()">
    <i class="fas fa-arrow-up"></i>
</div>

<script>
    const body           = document.body;
    const icon           = document.querySelector('.theme-toggle i');
    const returnToTopBtn = document.getElementById('return-to-top');

    const SHEET_URL        = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMEfkm2e1w-xg5P-iQGJNjGCECWkHW-qHKr-tDfm971K70C8874Grf66mMHow0kOkyskk4EaXPCng_/pub?gid=1012771992&single=true&output=csv';
    const REFRESH_INTERVAL = 3 * 60 * 1000;
    const MAX_RETRIES      = 3;
    const RETRY_DELAY      = 3000;

    /* ── Skeleton ─────────────────────────────────────────── */
    function showSkeleton() {
        let html = '';
        for (let i = 0; i < 10; i++) html += '<div class="skeleton-row"></div>';
        document.getElementById('subpageTableContainer').innerHTML = html;
    }

    /* ── Row animation ────────────────────────────────────── */
    let currentObserver = null;

    function initTableRowAnimations() {
        if (currentObserver) { currentObserver.disconnect(); currentObserver = null; }
        const table = document.querySelector('.subpage-table');
        if (!table) return;
        const rows = table.querySelectorAll('tbody tr');
        currentObserver = new IntersectionObserver((entries, obs) => {
            entries.forEach(e => {
                if (e.isIntersecting) { e.target.classList.add('fade-in-up'); obs.unobserve(e.target); }
            });
        }, { threshold: 0.1 });
        rows.forEach((r, i) => { r.style.transitionDelay = `${i * 0.02}s`; currentObserver.observe(r); });
    }

    /* ── Render table ─────────────────────────────────────── */
    function renderTable(csvData) {
        try {
            const rows = csvData.split('\n').map(r => r.split(','));
            if (rows.length < 2) throw new Error('CSV empty');

            let html = '<table class="subpage-table"><thead><tr>';
            rows[0].forEach(h => { html += `<th>${h.trim()}</th>`; });
            html += '</tr></thead><tbody>';

            for (let i = 1; i < rows.length; i++) {
                if (!rows[i] || rows[i].length < 2) continue;
                html += '<tr>';
                rows[i].forEach((cell, idx) => {
                    const v       = cell.trim();
                    const numOnly = v.replace(/[^0-9.]/g, '');
                    let display;
                    if (numOnly !== '' && !isNaN(numOnly)) {
                        const fmt = parseInt(numOnly).toLocaleString();
                        display   = idx === 0 ? fmt : fmt + ' Ks';
                    } else {
                        display = v;
                    }
                    html += `<td>${display}</td>`;
                });
                html += '</tr>';
            }
            html += '</tbody></table>';

            document.getElementById('subpageTableContainer').innerHTML = html;
            setTimeout(initTableRowAnimations, 100);

        } catch (err) {
            console.error('Render error:', err);
            document.getElementById('subpageTableContainer').innerHTML =
                '<div class="error">Failed to load price table!</div>';
        }
    }

    /* ── Fetch with retry ─────────────────────────────────── */
    async function fetchWithRetry(attempt = 0) {
        try {
            const res = await fetch(`${SHEET_URL}&t=${Date.now()}`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.text();
            if (!data) throw new Error('Empty response');
            return data;
        } catch (err) {
            if (attempt < MAX_RETRIES) {
                console.warn(`Retry ${attempt + 1}/${MAX_RETRIES}…`);
                await new Promise(r => setTimeout(r, RETRY_DELAY));
                return fetchWithRetry(attempt + 1);
            }
            throw err;
        }
    }

    /* ── Main fetch ───────────────────────────────────────── */
    async function fetchData() {
        showSkeleton();
        try {
            renderTable(await fetchWithRetry());
        } catch (err) {
            console.error('All retries failed:', err);
            document.getElementById('subpageTableContainer').innerHTML =
                '<div class="error">Failed to load price table!</div>';
        }
    }

    /* ── Service Worker ───────────────────────────────────── */
    async function registerServiceWorker() {
        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('/sw.js');
                navigator.serviceWorker.addEventListener('message', e => {
                    if (e.data.type === 'NEW_DATA_AVAILABLE') fetchData();
                });
            } catch (e) { console.error('SW failed:', e); }
        }
    }

    /* ── Init ─────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('theme') || 'dark';
        if (saved === 'light') {
            body.classList.replace('dark-theme', 'light-theme');
            icon.className = 'fas fa-moon';
        }

        registerServiceWorker();
        fetchData();
        setInterval(fetchData, REFRESH_INTERVAL);

        const copy = document.getElementById('copyright-text');
        if (copy) copy.textContent = `2019 - ${new Date().getFullYear()} copyright @Visa Topup Myanmar`;

        window.onscroll = () => {
            returnToTopBtn.style.display = (scrollY > 100) ? 'flex' : 'none';
        };
    });

    /* ── Theme ────────────────────────────────────────────── */
    function toggleTheme() {
        if (body.classList.contains('dark-theme')) {
            body.classList.replace('dark-theme', 'light-theme');
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        } else {
            body.classList.replace('light-theme', 'dark-theme');
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');
        }
    }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
</script>
</body>
</html>
