<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiktok coin price</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjOd1ufKHkNXLPmTI4s1feQWObG7DwY1cpIkYwBbMJJqm7JOLEKrKMAdNIE565tOmPKGbm9Ku_SdUbsKXN6YcANjGBHMLvJpsQgelcjFabjrb2_TJGLssQLmQWOfDvFPd7A1erbv_IGfK626zMfMpVfNJtZNNtR2pIsOK0HTdLqXnProNxWiPaWwAvZ2Gez/s1600/Webp.net-resizeimage.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary-light:    #f0f0f0;
            --bg-secondary-light:  #e0e0e0;
            --text-primary-light:  #333333;
            --text-secondary-light:#666666;
            --border-color-light:  #d0d0d0;
            --bg-primary-dark:     #121212;
            --bg-secondary-dark:   #1e1e1e;
            --text-primary-dark:   #f0f0f0;
            --text-secondary-dark: #b0b0b0;
            --border-color-dark:   #2a2a2a;
            --accent-blue:         #3B82F6;
            --accent-blue-dark:    #2563EB;
        }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        transition: background 0.3s ease, color 0.3s ease;
        min-height: 100vh;
    }

    body.dark-theme  { background: var(--bg-primary-dark);  color: var(--text-primary-dark); }
    body.light-theme { background: var(--bg-primary-light); color: var(--text-primary-light); }

    /* ══ HEADER ══════════════════════════════════════════════ */
    .header {
        padding: 20px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(2px); transition: all 0.3s ease;
    }

    body.dark-theme .header {
        background: rgba(18,18,18,0.85);
        border-bottom: 1px solid var(--border-color-dark);
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    body.light-theme .header {
        background: rgba(240,240,240,0.85);
        border-bottom: 1px solid var(--border-color-light);
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .logo-section { display: flex; align-items: center; gap: 6px; }
    .logo-section a {
        display: flex; align-items: center; gap: 10px;
        text-decoration: none; transition: all 0.3s ease;
    }
    .logo-section a:hover  { opacity: 0.9; transform: translateY(-1px); }
    .logo-section a:active { transform: translateY(1px); }
    .logo { height: 40px; width: auto; }

    @keyframes flowGradient {
        0%   { background-position: 100% 50%; }
        100% { background-position: 0%   50%; }
    }

    .site-title {
        font-size: 28px; font-weight: 600; font-family: 'Inter', sans-serif;
        background: linear-gradient(90deg, var(--accent-blue-dark), var(--accent-blue), #ffffff, var(--accent-blue), var(--accent-blue-dark));
        background-size: 300% 100%; animation: flowGradient 3s linear infinite;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    body.light-theme .site-title {
        background: linear-gradient(90deg, var(--accent-blue-dark), #1a1a1a, #888, #1a1a1a, var(--accent-blue-dark));
        background-size: 300% 100%; animation: flowGradient 3s linear infinite;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .theme-toggle {
        width: 44px; height: 44px; border-radius: 12px; border: none;
        cursor: pointer; font-size: 20px;
        display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
    }

    body.dark-theme .theme-toggle {
        background: var(--bg-secondary-dark); color: var(--text-primary-dark);
        box-shadow: 6px 6px 12px rgba(0,0,0,0.3), -6px -6px 12px rgba(70,70,70,0.1);
    }

    body.light-theme .theme-toggle {
        background: var(--bg-secondary-light); color: var(--text-primary-light);
        box-shadow: 6px 6px 12px rgba(0,0,0,0.1), -6px -6px 12px rgba(255,255,255,0.8);
    }

    .theme-toggle:hover  { transform: translateY(-2px); }
    .theme-toggle:active { transform: translateY(1px); }

    /* ══ PAGE CONTAINER ═════════════════════════════════════ */
    .subpage-container {
        max-width: 900px; margin: 0 auto; padding: 40px 16px 80px;
    }

    /* ══════════════════════════════════════════════════════════
       HERO WRAP
       ──────────────────────────────────────────────────────────
       .hero-wrap
         ├── .title-layer   z-index:1  (big title, always fully visible)
         └── .glass-card    z-index:2  (10% opacity bg + blur)
                            margin-top negative → overlaps bottom of title
                            backdrop-filter blurs title text behind it
    ══════════════════════════════════════════════════════════ */
    .hero-wrap {
        position: relative;
    }

    /* Title: sits in normal flow, z:1 */
    .title-layer {
        position: relative;
        z-index: 1;
        text-align: center;
        pointer-events: none;
        user-select: none;
        padding-bottom: 0;
    }

    .subpage-title {
        display: block;
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: clamp(28px, 5vw, 50px);
        line-height: 1.15;
        letter-spacing: -0.5px;
    }

    body.dark-theme  .subpage-title { color: rgba(235,238,255,0.95); }
    body.light-theme .subpage-title { color: rgba(20,25,50,0.90); }

    /* ── Glass card: z:2, negative margin overlaps title ─── */
    .glass-card {
        position: relative;
        z-index: 2;
        /* Pull card up so it covers bottom half of title */
        margin-top: -28px;
        border-radius: 18px;
        overflow: hidden;
        /* Blur blurs the title that is literally behind this element */
        backdrop-filter: blur(8px) saturate(120%);
        -webkit-backdrop-filter: blur(8px) saturate(120%);
    }

    /* ── 10% opacity background — so title is visible through it ── */
    body.dark-theme .glass-card {
        /* dark blue at only 10% opacity */
        background: rgba(20, 35, 70, 0.10);
        border: 1px solid rgba(255,255,255,0.10);
        box-shadow: 0 8px 32px rgba(0,0,0,0.30);
    }

    body.light-theme .glass-card {
        /* white at only 10% opacity */
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.25);
        box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }

    /* ══ TABLE ══════════════════════════════════════════════ */
    .subpage-table {
        width: 100%; border-collapse: collapse;
        font-family: 'Inter', sans-serif;
    }

    .subpage-table th,
    .subpage-table td {
        padding: 16px 20px; text-align: center;
        transition: background 0.15s ease;
    }

    /* Header: also very transparent */
    .subpage-table th {
        /* Blue tint at ~20% only */
        background: rgba(59,130,246,0.01);
        backdrop-filter: blur(1px);
        -webkit-backdrop-filter: blur(6px);
        font-weight: 700; font-size: 13px;
        text-transform: uppercase; letter-spacing: 0.07em;
        border-bottom: 1px solid rgba(59,130,246,0.25);
    }

    body.dark-theme  .subpage-table th { color: rgba(255,255,255,0.90); }
    body.light-theme .subpage-table th { color: rgba(15,25,60,0.88); }

    .subpage-table td {
        font-size: 15px;
        border-bottom: 1px solid rgba(128,160,255,0.08);
    }

    body.dark-theme  .subpage-table td { color: rgba(220,228,255,0.92); }
    body.light-theme .subpage-table td { color: rgba(20,25,50,0.85); }

    /* Even rows: barely visible tint */
    body.dark-theme  .subpage-table tr:nth-child(even) td { background: rgba(59,130,246,0.05); }
    body.light-theme .subpage-table tr:nth-child(even) td { background: rgba(59,130,246,0.03); }

    .subpage-table tbody tr:last-child td { border-bottom: none; }
    .subpage-table tr:hover td { background: rgba(59,130,246,0.12) !important; }

    /* Coin icon */
    .subpage-table td:first-child::after {
        content: "";
        display: inline-block;
        background-image: url("assets/TikTokCoin.png");
        background-size: contain; background-repeat: no-repeat; background-position: center;
        width: 18px; height: 18px; margin-left: 8px; vertical-align: middle;
    }

    /* Row fade-in */
    .subpage-table tbody tr {
        opacity: 0; transform: translateY(8px);
        transition: opacity 0.3s ease-out, transform 0.3s ease-out;
    }
    .subpage-table tbody tr.fade-in-up { opacity: 1; transform: translateY(0); }

    /* ══ LOADING / ERROR ════════════════════════════════════ */
    .loading {
        padding: 40px; text-align: center;
        font-family: 'Inter', sans-serif; font-size: 18px;
    }

    body.dark-theme  .loading { color: var(--text-secondary-dark); }
    body.light-theme .loading { color: var(--text-secondary-light); }

    .error {
        padding: 40px; text-align: center; color: #ff6b6b;
        font-family: 'Inter', sans-serif; font-size: 18px;
    }

    /* Skeleton */
    .skeleton-row {
        height: 44px; margin: 6px 0; border-radius: 8px;
        position: relative; overflow: hidden;
        background: rgba(255,255,255,0.04);
    }

    .skeleton-row::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
        animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* ══ SCROLL TO TOP ══════════════════════════════════════ */
    #return-to-top {
        position: fixed; bottom: 30px; right: 30px;
        width: 50px; height: 50px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-dark));
        border: none; color: white; cursor: pointer;
        display: none; align-items: center; justify-content: center;
        transition: all 0.3s ease; z-index: 1000;
    }

    body.dark-theme #return-to-top {
        box-shadow: 5px 5px 15px rgba(0,0,0,0.4), 0 0 0 2px rgba(59,130,246,0.5);
    }

    body.light-theme #return-to-top {
        box-shadow: 5px 5px 15px rgba(0,0,0,0.2), 0 0 0 2px rgba(59,130,246,0.5);
    }

    #return-to-top:hover  { transform: translateY(-5px) scale(1.05); }
    #return-to-top:active { transform: translateY(2px); }

    /* ══ COPYRIGHT ══════════════════════════════════════════ */
    #copyright-text {
        font-family: 'Inter', sans-serif; text-align: center; font-size: small;
        margin-top: 20px; margin-bottom: 80px; padding: 0 20px;
    }

    body.dark-theme  #copyright-text { color: var(--text-secondary-dark); }
    body.light-theme #copyright-text { color: var(--text-secondary-light); }

    /* ══ RESPONSIVE ═════════════════════════════════════════ */
    @media (max-width: 768px) {
        .site-title { font-size: clamp(22px, 6vw, 36px); }
        .glass-card { margin-top: -20px; }
        .subpage-table { font-size: 13px; }
        .subpage-table th, .subpage-table td { padding: 12px 8px; }
    }

    @media (max-width: 480px) {
        .header { padding: 15px; }
        .logo { height: 32px; }
        .theme-toggle { width: 40px; height: 40px; font-size: 18px; }
        .site-title { font-size: 20px; }
        .glass-card { margin-top: -14px; }
        .subpage-table { font-size: 12px; }
        .subpage-table th, .subpage-table td { padding: 10px 6px; }
    }
</style>
</head>
<body class="dark-theme">

<header class="header">
    <div class="logo-section">
        <a href="index.html">
            <img alt="Logo" class="logo" src="assets/logo.png">
            <h1 class="site-title">Visa Topup Myanmar</h1>
        </a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-sun"></i>
    </button>
</header>

<div class="subpage-container">
    <div class="hero-wrap">

        <!-- z:1 — title fully visible, bottom half will show through glass -->
        <div class="title-layer">
            <h2 class="subpage-title">TikTok coin price list</h2>
        </div>

        <!-- z:2 — 10% opacity glass, blur reveals title behind -->
        <div class="glass-card">
            <div id="subpageTableContainer">
                <div class="loading">Loading...</div>
            </div>
        </div>

    </div>
</div>

<p id="copyright-text"></p>

<div id="return-to-top" onclick="scrollToTop()">
    <i class="fas fa-arrow-up"></i>
</div>

<script>
    const body           = document.body;
    const icon           = document.querySelector('.theme-toggle i');
    const returnToTopBtn = document.getElementById('return-to-top');

    const SHEET_URL        = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMEfkm2e1w-xg5P-iQGJNjGCECWkHW-qHKr-tDfm971K70C8874Grf66mMHow0kOkyskk4EaXPCng_/pub?gid=1012771992&single=true&output=csv';
    const REFRESH_INTERVAL = 3 * 60 * 1000;
    const MAX_RETRIES      = 3;
    const RETRY_DELAY      = 2000;

    /* ── Skeleton (shown instantly before fetch) ──────────── */
    function showSkeleton() {
        let html = '<div style="padding:8px">';
        for (let i = 0; i < 12; i++) html += '<div class="skeleton-row"></div>';
        html += '</div>';
        document.getElementById('subpageTableContainer').innerHTML = html;
    }

    /* ── Row animation ────────────────────────────────────── */
    let obs = null;

    function initRowAnims() {
        if (obs) { obs.disconnect(); obs = null; }
        const rows = document.querySelectorAll('.subpage-table tbody tr');
        obs = new IntersectionObserver((entries, o) => {
            entries.forEach(e => {
                if (e.isIntersecting) { e.target.classList.add('fade-in-up'); o.unobserve(e.target); }
            });
        }, { threshold: 0.05 });
        rows.forEach((r, i) => { r.style.transitionDelay = `${i * 0.002}s`; obs.observe(r); });
    }

    /* ── Render table ─────────────────────────────────────── */
    function renderTable(csv) {
        try {
            const rows = csv.trim().split('\n').map(r => r.split(','));
            if (rows.length < 2) throw new Error('Empty CSV');

            let html = '<table class="subpage-table"><thead><tr>';
            rows[0].forEach(h => { html += `<th>${h.trim()}</th>`; });
            html += '</tr></thead><tbody>';

            for (let i = 1; i < rows.length; i++) {
                if (!rows[i] || rows[i].length < 2) continue;
                html += '<tr>';
                rows[i].forEach((cell, idx) => {
                    const v   = cell.trim();
                    const num = v.replace(/[^0-9.]/g, '');
                    let disp;
                    if (num !== '' && !isNaN(num)) {
                        const f = parseInt(num).toLocaleString();
                        disp = idx === 0 ? f : f + ' Ks';
                    } else { disp = v; }
                    html += `<td>${disp}</td>`;
                });
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('subpageTableContainer').innerHTML = html;
            // Kick off row animations right away (no setTimeout delay)
            initRowAnims();
        } catch (e) {
            document.getElementById('subpageTableContainer').innerHTML =
                '<div class="error">Failed to load price table!</div>';
        }
    }

    /* ── Fetch: no cache, with retry ──────────────────────── */
    async function fetchWithRetry(attempt = 0) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 8000); // 8s timeout
        try {
            const res  = await fetch(`${SHEET_URL}&t=${Date.now()}`, {
                cache: 'no-store', signal: ctrl.signal
            });
            clearTimeout(tid);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.text();
            if (!data) throw new Error('Empty');
            return data;
        } catch (err) {
            clearTimeout(tid);
            if (attempt < MAX_RETRIES) {
                await new Promise(r => setTimeout(r, RETRY_DELAY));
                return fetchWithRetry(attempt + 1);
            }
            throw err;
        }
    }

    /* ── Main fetch ───────────────────────────────────────── */
    async function fetchData() {
        showSkeleton();
        try {
            const data = await fetchWithRetry();
            renderTable(data);
        } catch (err) {
            document.getElementById('subpageTableContainer').innerHTML =
                '<div class="error">Failed to load price table!</div>';
        }
    }

    /* ── Service Worker ───────────────────────────────────── */
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
        navigator.serviceWorker.addEventListener('message', e => {
            if (e.data?.type === 'NEW_DATA_AVAILABLE') fetchData();
        });
    }

    /* ── Init ─────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('theme') || 'dark';
        if (saved === 'light') {
            body.classList.replace('dark-theme', 'light-theme');
            icon.className = 'fas fa-moon';
        }

        // Fetch immediately — no delay
        fetchData();
        setInterval(fetchData, REFRESH_INTERVAL);

        const copy = document.getElementById('copyright-text');
        if (copy) copy.textContent = `2019 - ${new Date().getFullYear()} copyright @Visa Topup Myanmar`;

        window.onscroll = () => {
            returnToTopBtn.style.display = scrollY > 100 ? 'flex' : 'none';
        };
    });

    /* ── Theme ────────────────────────────────────────────── */
    function toggleTheme() {
        if (body.classList.contains('dark-theme')) {
            body.classList.replace('dark-theme', 'light-theme');
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        } else {
            body.classList.replace('light-theme', 'dark-theme');
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');
        }
    }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
</script>

</body>
</html>
