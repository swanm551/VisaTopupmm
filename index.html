<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visa Topup Myanmar</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dark-theme">

    <header class="header">
        <div class="logo-section">
            <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
                <img alt="Logo" class="logo" src="assets/logo.png">
                <h1 class="site-title">Visa Topup Myanmar</h1>
            </a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-sun"></i>
        </button>
    </header>

    <div class="opening-hours">
        <span class="live-dot"></span> Open hours: 9AM to 9PM
    </div>

    <main>
        <div class="table-label">📈 Live Exchange Rates</div>

        <div class="exchange-table" id="rateTable">
            <table class="skeleton-table">
                <thead><tr>
                    <th><span class="loading-skeleton"></span></th>
                    <th><span class="loading-skeleton"></span></th>
                    <th><span class="loading-skeleton"></span></th>
                </tr></thead>
                <tbody>
                    <tr><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td></tr>
                    <tr><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td></tr>
                    <tr><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td></tr>
                    <tr><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td></tr>
                    <tr><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td><td><span class="loading-skeleton"></span></td></tr>
                </tbody>
            </table>
        </div>

        <div class="update-time" id="updateTime"></div>

        <div class="fee-buttons">
            <button class="fee-button" onclick="showFeeTable('uab')">UAB Topup Fee</button>
            <button class="fee-button" onclick="showFeeTable('aya')">AYA Topup Fee</button>
            <button class="fee-button" onclick="showFeeTable('cb')">CB Topup Fee</button>
            <button class="fee-button" onclick="showFeeTable('kbz')">KBZ Topup Fee</button>
            <button class="fee-button" onclick="showFeeTable('mab')">MAB Topup Fee</button>
            <button class="fee-button fee-button--tiktok" onclick="showFeeTable('tiktok')">
                <i class="fab fa-tiktok"></i> TikTok Coin
            </button>
        </div>

        <div id="image-copyright-container">
            <img src="assets/vtm.png" alt="Visa Topup Myanmar Logo"
                 style="max-width:100%;height:auto;display:block;margin:0 auto;" loading="lazy">
            <p id="copyright-text"></p>
        </div>

        <div class="fee-tables" id="feeTables"></div>
    </main>

    <div id="return-to-top" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </div>

    <footer class="footer">
        <a class="social-button call-btn"                href="tel:+959770770640"                                                       data-tooltip="Call Us">   <i class="fas fa-phone"></i></a>
        <a class="social-button messenger-btn"           href="https://m.me/VisaTopup.mm"                                               data-tooltip="Messenger"><i class="fab fa-facebook-messenger"></i></a>
        <a class="social-button facebook-btn"            href="https://www.facebook.com/VisaTopup.mm"                                   data-tooltip="Facebook"> <i class="fab fa-facebook-f"></i></a>
        <a class="social-button messenger-broadcast-btn" href="https://www.messenger.com/channel/VisaTopup.mm"                          data-tooltip="Broadcast"><i class="fas fa-broadcast-tower"></i></a>
        <a class="social-button telegram-btn"            href="https://t.me/visatopupmm"                                                data-tooltip="Telegram"> <i class="fab fa-telegram"></i></a>
        <a class="social-button viber-btn"               href="https://connect.viber.com/business/bd431ce0-b17d-11ef-9d00-aaf31c97cca2" data-tooltip="Viber">    <i class="fab fa-viber"></i></a>
    </footer>

    <script src="main.js"></script>
</body>
</html>
